# ai-job-search-app — full stack.
#
#   Default (JSON datastore):   docker compose up --build
#   With PostgreSQL:            docker compose --profile postgres up --build
#                               (also set DB_DRIVER=postgres in .env)
#   With LaTeX in the backend:  docker compose build --build-arg WITH_LATEX=true backend
#
# Copy .env.example to .env and set real JWT_SECRET / APP_SECRET first.

services:
  backend:
    build:
      context: ./backend
      args:
        WITH_LATEX: ${WITH_LATEX:-false}
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NODE_ENV: production
      DB_DRIVER: ${DB_DRIVER:-json}
      JSON_DB_PATH: data/db.json
      DATABASE_URL: ${DATABASE_URL:-postgresql://appuser:apppass@postgres:5432/aijobsearch?schema=public}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      APP_SECRET: ${APP_SECRET:?set APP_SECRET in .env}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: aijobsearch
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  backend-data:
  postgres-data:
